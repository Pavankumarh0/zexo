name: zexo
description: "Zexo — proximity-first social discovery app."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.5.0
  web_socket_channel: ^3.0.1

  # Backend / auth / storage
  supabase_flutter: ^2.5.6
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Location
  geolocator: ^12.0.0
  background_fetch: ^1.3.5
  sensors_plus: ^6.0.1

  # Maps
  mapbox_maps_flutter: ^2.2.0

  # Push notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4

  # Telemetry
  sentry_flutter: ^8.6.0

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
